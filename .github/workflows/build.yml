name: Build Chromium (Anti-Detection)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  CHROMIUM_VERSION: "139.0.7258.154"
  CHROMIUM_DIR: "${{ github.workspace }}/chromium_src"

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 480

    steps:
      # ─────────────────────────────────────────────────────
      # 1. Checkout your repo
      # ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────
      # 2. Setup Python
      # ─────────────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ─────────────────────────────────────────────────────
      # 3. Install depot_tools
      # ─────────────────────────────────────────────
      - name: Install depot_tools
        run: |
          git clone --depth=1 https://chromium.googlesource.com/chromium/tools/depot_tools.git ~/depot_tools
          echo "$HOME/depot_tools" >> $GITHUB_PATH

      # ─────────────────────────────────────────────
      # 3. Cache Chromium source
      # ─────────────────────────────────────────────
      - name: Cache Chromium source
        id: cache_src
        uses: actions/cache@v4
        with:
          path: chromium_src
          key: chromium-src-${{ env.CHROMIUM_VERSION }}-v1

      # ─────────────────────────────────────────────
      # 4. Fetch Chromium source (if not cached)
      # ─────────────────────────────────────────────
      - name: Fetch Chromium source
        if: steps.cache_src.outputs.cache-hit != 'true'
        run: |
          mkdir -p chromium_src
          cd chromium_src

          # Create .gclient config
          cat > .gclient << 'EOF'
          solutions = [
            {
              "name": "src",
              "url": "https://chromium.googlesource.com/chromium/src.git",
              "managed": False,
              "custom_deps": {},
              "custom_vars": {},
            },
          ]
          target_os = ['win']
          EOF

          # Fetch with no history (faster)
          gclient sync \
            --no-history \
            --nohooks \
            --with_branch_heads \
            --with_tags \
            -r src@refs/tags/${{ env.CHROMIUM_VERSION }}

      # ─────────────────────────────────────────────
      # 5. Install build dependencies
      # ─────────────────────────────────────────────
      - name: Install build dependencies
        run: |
          cd chromium_src/src
          sudo ./build/install-build-deps.sh --no-prompt --no-chromeos-fonts

      # ─────────────────────────────────────────────
      # 6. Apply patches (fuzz-tolerant)
      #
      #    এই repo-র patches-এ fake git hashes আছে
      #    তাই `git apply` কাজ করে না।
      #    `patch -p1 --fuzz=3 --ignore-whitespace` ব্যবহার করা হচ্ছে।
      # ─────────────────────────────────────────────
      - name: Apply anti-detection patches
        run: |
          PATCHES_DIR="${{ github.workspace }}/patches"
          CHROMIUM_SRC="${{ github.workspace }}/chromium_src/src"
          
          cd "$CHROMIUM_SRC"
          
          APPLIED=0
          FAILED=0

          # Patches apply order
          PATCH_ORDER=(
            "000-fingerprint-session-manager.patch"
            "001-remove-webdriver.patch"
            "002-remove-automation-flags.patch"
            "020-canvas-noise.patch"
            "021-canvas-unified.patch"
            "022-navigator-unified.patch"
            "023-webgl-unified.patch"
            "024-audio-unified.patch"
            "025-screen-unified.patch"
            "audio-fingerprint.patch"
            "automation-removal.patch"
            "canvas-noise.patch"
            "cdp-removal.patch"
            "permissions-stealth.patch"
            "webgl-fingerprint.patch"
          )

          for patch_name in "${PATCH_ORDER[@]}"; do
            patch_file="$PATCHES_DIR/$patch_name"
            
            if [ ! -f "$patch_file" ]; then
              echo "⚠ SKIP (not found): $patch_name"
              continue
            fi

            echo "──────────────────────────────────"
            echo "Applying: $patch_name"

            # Try 1: git apply (strict)
            if git apply --check "$patch_file" 2>/dev/null; then
              git apply "$patch_file"
              echo "✓ Applied (git apply): $patch_name"
              ((APPLIED++))
              continue
            fi

            # Try 2: patch --fuzz=3 (tolerant — handles fake hash lines)
            if patch -p1 --fuzz=3 --ignore-whitespace \
                 --no-backup-if-mismatch -i "$patch_file" 2>/dev/null; then
              echo "✓ Applied (fuzz=3): $patch_name"
              ((APPLIED++))
              continue
            fi

            # Try 3: patch --fuzz=10 (very tolerant)
            if patch -p1 --fuzz=10 --ignore-whitespace \
                 --no-backup-if-mismatch -i "$patch_file" 2>/dev/null; then
              echo "✓ Applied (fuzz=10): $patch_name"
              ((APPLIED++))
              continue
            fi

            # Try 4: manual apply — strip index/diff headers, use only hunks
            echo "⚠ Trying manual hunk extraction for: $patch_name"
            CLEAN_PATCH=$(mktemp /tmp/patch_XXXXXX.patch)
            # Remove fake index lines that confuse git apply
            grep -v '^index [0-9a-f]\{7\}\.\.' "$patch_file" > "$CLEAN_PATCH" || true
            
            if patch -p1 --fuzz=3 --ignore-whitespace \
                 --no-backup-if-mismatch -i "$CLEAN_PATCH" 2>/dev/null; then
              echo "✓ Applied (cleaned): $patch_name"
              ((APPLIED++))
              rm -f "$CLEAN_PATCH"
              continue
            fi
            rm -f "$CLEAN_PATCH"

            # All methods failed
            echo "✗ FAILED: $patch_name"
            echo "  Error details:"
            patch -p1 --fuzz=3 -i "$patch_file" 2>&1 | head -20 || true
            ((FAILED++))
          done

          echo ""
          echo "══════════════════════════════"
          echo "Patch Summary:"
          echo "  Applied : $APPLIED"
          echo "  Failed  : $FAILED"
          echo "══════════════════════════════"

          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::$FAILED patch(es) failed to apply. Build may still succeed."
          fi

      # ─────────────────────────────────────────────
      # 7. Configure GN build
      # ─────────────────────────────────────────────
      - name: Configure build (GN)
        run: |
          CHROMIUM_SRC="${{ github.workspace }}/chromium_src/src"
          cd "$CHROMIUM_SRC"

          mkdir -p out/Release

          # Copy args.gn from repo
          cp "${{ github.workspace }}/config/args.gn" out/Release/args.gn

          # Run install-sysroot
          python3 build/linux/sysroot_scripts/install-sysroot.py --arch=amd64

          # Run hooks
          gclient runhooks

          # Generate build files
          gn gen out/Release

      # ─────────────────────────────────────────────
      # 8. Build Chromium
      # ─────────────────────────────────────────────
      - name: Build Chromium
        run: |
          CHROMIUM_SRC="${{ github.workspace }}/chromium_src/src"
          cd "$CHROMIUM_SRC"

          # Use autoninja if available
          NINJA=$(which autoninja || which ninja)
          JOBS=$(($(nproc) > 4 ? $(nproc) - 2 : $(nproc)))

          echo "Building with $JOBS jobs..."
          $NINJA -j$JOBS -C out/Release chrome chromedriver

      # ─────────────────────────────────────────────
      # 9. Package binary
      # ─────────────────────────────────────────────
      - name: Package build output
        run: |
          CHROMIUM_SRC="${{ github.workspace }}/chromium_src/src"
          cd "$CHROMIUM_SRC/out/Release"

          mkdir -p antidetect-chromium

          # Copy essential files
          cp chrome.exe antidetect-chromium/ 2>/dev/null || true
          cp -r chromedriver.exe antidetect-chromium/ 2>/dev/null || true
          cp *chrome.dll antidetect-chromium/ 2>/dev/null || true
          cp chrome_elf.dll antidetect-chromium/ 2>/dev/null || true
          cp icudtl.dat antidetect-chromium/ 2>/dev/null || true
          cp *.pak  antidetect-chromium/ 2>/dev/null || true
          cp *.bin   antidetect-chromium/ 2>/dev/null || true

          # Strip debug symbols
          strip antidetect-chromium/chrome antidetect-chromium/chromedriver 2>/dev/null || true

          # Create archive
          tar -czf antidetect-chromium-linux-x64.tar.gz antidetect-chromium/

          # Checksum
          sha256sum antidetect-chromium-linux-x64.tar.gz > antidetect-chromium-linux-x64.tar.gz.sha256

          echo "Build size: $(du -h antidetect-chromium-linux-x64.tar.gz | cut -f1)"

      # ─────────────────────────────────────────────
      # 10. Upload artifact
      # ─────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: antidetect-chromium-linux-x64
          path: |
            chromium_src/src/out/Release/antidetect-chromium-linux-x64.tar.gz
            chromium_src/src/out/Release/antidetect-chromium-linux-x64.tar.gz.sha256
          retention-days: 7
